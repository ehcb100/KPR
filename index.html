<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KH App Final</title>

<link rel="manifest" href="manifest.json">

<style>
body{margin:0;font-family:'Trebuchet MS',sans-serif;background:radial-gradient(circle,#0a0f2c,#000);color:#fff;overflow:auto;opacity:0;transition:.6s}
.container{display:flex;height:100vh}
.sidebar{width:280px;background:rgba(0,0,0,.8);padding:20px}
.menu-item{padding:14px;margin:10px 0;border-radius:12px;cursor:pointer}
.menu-item.active{background:linear-gradient(90deg,#1d4ed8,#60a5fa);box-shadow:0 0 20px #3b82f6}
.content{flex:1;padding:30px;transition:.3s;overflow-y:auto}
.hidden{display:none}
.card{background:#020617;padding:12px;border-radius:10px;margin:5px 0;border:1px solid #3b82f6}
input{padding:8px;border:none;border-radius:6px;margin:5px}
button{padding:8px;border:none;border-radius:6px;cursor:pointer}
canvas{position:absolute;top:0;left:0;z-index:-1}
</style>
</head>

<body>
<canvas id="bg"></canvas>

<button onclick="toggleAudio()">🔊 Som</button>

<audio id="bgm" src="https://cdn.pixabay.com/audio/2022/03/15/audio_9c9c3b9e64.mp3" loop></audio>
<audio id="khSound" src="kh-sound.mp3"></audio>

<div class="container">
<div class="sidebar">
<div class="menu-item active" onclick="trocar(0)">Estoque</div>
<div class="menu-item" onclick="trocar(1)">Lista</div>
<div class="menu-item" onclick="trocar(2)">Relatórios</div>
</div>

<div class="content" id="tela0"><h2>Estoque</h2><div id="lista"></div></div>
<div class="content hidden" id="tela1">
<h2>Adicionar</h2>
<input id="nome" placeholder="Nome">
<input id="ref" placeholder="Referência">
<button onclick="add()">Adicionar</button>
</div>
<div class="content hidden" id="tela2"><h2>Total: <span id="total"></span></h2></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAs95QRYT1xn-y3IFofADp-nOhYnPIbCgU",
  authDomain: "estoque-reserva.firebaseapp.com",
  projectId: "estoque-reserva",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let mutado = false;

window.toggleAudio = () => {
 const bgm = document.getElementById('bgm');
 mutado = !mutado;
 bgm.muted = mutado;
}

window.addEventListener('click', () => {
 const bgm = document.getElementById('bgm');
 bgm.play().catch(()=>{});
}, { once: true });

window.onload=()=>{
 document.body.style.opacity=1
 carregar()
}

async function carregar(){
 const snap=await getDocs(collection(db,"estoque"))
 const lista=document.getElementById('lista')
 lista.innerHTML=''
 let total=0
 snap.forEach(docSnap=>{
  const item=docSnap.data()
  total++
  const div=document.createElement('div')
  div.className='card'
  div.innerHTML=`${item.nome} - Ref: ${item.ref} <button onclick="remover('${docSnap.id}')">X</button>`
  lista.appendChild(div)
 })
 document.getElementById('total').innerText=total
}

function playSound(){
 const s = document.getElementById('khSound');
 s.currentTime = 0;
 s.play();
}

window.add = async () => {
 const nome = document.getElementById('nome').value.trim();
 const ref = document.getElementById('ref').value.trim();

 if (!nome || !ref) {
  alert("Preencha nome e referência!");
  return;
 }

 try {
  await addDoc(collection(db, "estoque"), { nome, ref });

  document.getElementById('nome').value = "";
  document.getElementById('ref').value = "";

  playSound();
  carregar();
 } catch (e) {
  console.error("Erro ao adicionar:", e);
  alert("Erro ao salvar no Firebase");
 }
};

window.remover=async(id)=>{
 await deleteDoc(doc(db,"estoque",id))
 playSound()
 carregar()
}

window.trocar=(t)=>{
 document.querySelectorAll('.content').forEach(c=>c.classList.add('hidden'))
 document.getElementById('tela'+t).classList.remove('hidden')
 document.querySelectorAll('.menu-item').forEach(i=>i.classList.remove('active'))
 document.querySelectorAll('.menu-item')[t].classList.add('active')
 playSound()
}

// partículas
const canvas=document.getElementById('bg')
const ctx=canvas.getContext('2d')
canvas.width=innerWidth
canvas.height=innerHeight
let p=[]
for(let i=0;i<60;i++){p.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,v:Math.random()})}
function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height)
 p.forEach(a=>{a.y+=a.v;if(a.y>canvas.height)a.y=0;ctx.fillStyle='#60a5fa';ctx.fillRect(a.x,a.y,2,2)})
 requestAnimationFrame(draw)
}
draw()
</script>

</body>
</html>
